version: "3.9"
services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: swarmfront_rank
    ports:
      - "5433:5432"
    volumes:
      - rank_pgdata:/var/lib/postgresql/data
volumes:
  rank_pgdata:
